name: Notification Dispatch

concurrency:
  group: notification-dispatch
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  dispatch-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger notification dispatch
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.PHASE7_CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not configured"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::PHASE7_CRON_SECRET secret is not configured"
            exit 1
          fi

          URL="${APP_URL%/}/api/cron/notifications"

          for attempt in 1 2 3; do
            echo "Attempt $attempt: GET $URL"
            HTTP_CODE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 30 \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              "${URL}")

            echo "Response HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Notification dispatch succeeded (HTTP $HTTP_CODE)"
              exit 0
            fi

            if [ "$HTTP_CODE" -ge 400 ] && [ "$HTTP_CODE" -lt 500 ]; then
              echo "::error::Client error HTTP $HTTP_CODE — not retrying"
              exit 1
            fi

            if [ "$attempt" -lt 3 ]; then
              DELAY=$((attempt * 5))
              echo "Server error or timeout (HTTP $HTTP_CODE) — retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done

          echo "::error::All 3 attempts failed (last HTTP status: $HTTP_CODE)"
          exit 1
